<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="context-stroke"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><rect width="100%" height="100%" fill="#F8FAFC"/><text x="80" y="78" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#172033"><tspan x="80" dy="0">Page vs Component</tspan></text><text x="80" y="118" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="450" fill="#58657A"><tspan x="80" dy="0">The complete room versus the reusable furniture inside it</tspan></text><rect x="90" y="165" width="820" height="790" rx="28" fill="#F0FDF4" stroke="#15803D" stroke-width="3"/><rect x="1010" y="165" width="820" height="790" rx="28" fill="#F0FDFA" stroke="#0F766E" stroke-width="3"/><text x="500" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#15803D"><tspan x="500" dy="0">PAGE</tspan></text><text x="1420" y="230" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900" fill="#0F766E"><tspan x="1420" dy="0">COMPONENT</tspan></text><rect x="330" y="260" width="340" height="46" rx="23" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0"/><text x="500" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#15803D"><tspan x="500" dy="0">TaskListPage</tspan></text><rect x="1250" y="260" width="340" height="46" rx="23" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0"/><text x="1420" y="291" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#0F766E"><tspan x="1420" dy="0">TaskCard</tspan></text><rect x="130" y="350" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/><text x="158" y="385" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="158" dy="0">Represents a URL</tspan></text><text x="158" y="416" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="158" dy="0">Example: /tasks</tspan></text><rect x="130" y="462" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/><text x="158" y="497" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="158" dy="0">Coordinates API calls</tspan></text><text x="158" y="528" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="158" dy="0">Calls listTasks()</tspan></text><rect x="130" y="574" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/><text x="158" y="609" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="158" dy="0">Owns page-level state</tspan></text><text x="158" y="640" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="158" dy="0">Loading, filters, errors</tspan></text><rect x="130" y="686" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/><text x="158" y="721" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="158" dy="0">Composes many components</tspan></text><text x="158" y="752" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="158" dy="0">Cards, badges, buttons</tspan></text><rect x="130" y="798" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#15803D" stroke-width="1"/><text x="158" y="833" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="158" dy="0">Usually not reused inside another page</tspan></text><text x="158" y="864" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="158" dy="0">One route, one main screen</tspan></text><rect x="1050" y="350" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/><text x="1078" y="385" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="1078" dy="0">Represents part of a screen</tspan></text><text x="1078" y="416" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="1078" dy="0">A single task summary</tspan></text><rect x="1050" y="462" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/><text x="1078" y="497" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="1078" dy="0">Receives data through props</tspan></text><text x="1078" y="528" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="1078" dy="0">task, busy and callbacks</tspan></text><rect x="1050" y="574" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/><text x="1078" y="609" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="1078" dy="0">Usually stays presentation-focused</tspan></text><text x="1078" y="640" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="1078" dy="0">No direct API calls</tspan></text><rect x="1050" y="686" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/><text x="1078" y="721" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="1078" dy="0">Designed for reuse</tspan></text><text x="1078" y="752" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="1078" dy="0">List, details, future views</tspan></text><rect x="1050" y="798" width="740" height="88" rx="16" fill="#FFFFFF" stroke="#0F766E" stroke-width="1"/><text x="1078" y="833" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="750" fill="#172033"><tspan x="1078" dy="0">Does not choose the application route</tspan></text><text x="1078" y="864" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="500" fill="#58657A"><tspan x="1078" dy="0">Focuses on display and events</tspan></text></svg>