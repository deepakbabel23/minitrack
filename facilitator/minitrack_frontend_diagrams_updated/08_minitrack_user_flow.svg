<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080"><defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,10 L10,5 z" fill="context-stroke"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><rect width="100%" height="100%" fill="#F8FAFC"/><text x="80" y="78" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#172033"><tspan x="80" dy="0">MiniTrack Frontend User Flow</tspan></text><text x="80" y="118" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="450" fill="#58657A"><tspan x="80" dy="0">Screens and actions supported by the existing FastAPI API</tspan></text><rect x="90" y="430" width="320" height="130" rx="20" fill="#FAF5FF" stroke="#7E22CE" stroke-width="3"/><text x="250" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#7E22CE"><tspan x="250" dy="0">Connect</tspan></text><text x="250" y="507" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="250" dy="0">Enter and verify X-API-Key</tspan></text><rect x="520" y="390" width="380" height="210" rx="20" fill="#F0FDF4" stroke="#15803D" stroke-width="3"/><text x="710" y="432" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#15803D"><tspan x="710" dy="0">Task List</tspan></text><text x="710" y="467" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="710" dy="0">Filter All, Active or</tspan><tspan x="710" dy="24">Completed; load more</tspan></text><rect x="1030" y="170" width="350" height="140" rx="20" fill="#EFF6FF" stroke="#2563EB" stroke-width="3"/><text x="1205" y="212" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#2563EB"><tspan x="1205" dy="0">Create Task</tspan></text><text x="1205" y="247" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="1205" dy="0">POST /tasks</tspan></text><rect x="1030" y="430" width="350" height="140" rx="20" fill="#EEF2FF" stroke="#4F46E5" stroke-width="3"/><text x="1205" y="472" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#4F46E5"><tspan x="1205" dy="0">Task Detail</tspan></text><text x="1205" y="507" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="1205" dy="0">GET /tasks/{id}</tspan></text><rect x="1030" y="690" width="350" height="140" rx="20" fill="#FFFBEB" stroke="#B45309" stroke-width="3"/><text x="1205" y="732" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#B45309"><tspan x="1205" dy="0">Edit Task</tspan></text><text x="1205" y="767" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="1205" dy="0">Full-body PATCH /tasks/{id}</tspan></text><rect x="1530" y="300" width="300" height="120" rx="20" fill="#F0FDF4" stroke="#15803D" stroke-width="3"/><text x="1680" y="342" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#15803D"><tspan x="1680" dy="0">Complete</tspan></text><text x="1680" y="377" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="1680" dy="0">POST /complete; one-way</tspan></text><rect x="1530" y="600" width="300" height="120" rx="20" fill="#FEF2F2" stroke="#B91C1C" stroke-width="3"/><text x="1680" y="642" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#B91C1C"><tspan x="1680" dy="0">Delete</tspan></text><text x="1680" y="677" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="500" fill="#58657A"><tspan x="1680" dy="0">DELETE /tasks/{id}</tspan></text><line x1="410" y1="495" x2="520" y2="495" stroke="#7E22CE" stroke-width="4"  marker-end="url(#arrow)"/><text x="465" y="475" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#7E22CE"><tspan x="465" dy="0">Valid key</tspan></text><line x1="900" y1="430" x2="1030" y2="240" stroke="#2563EB" stroke-width="4"  marker-end="url(#arrow)"/><line x1="900" y1="495" x2="1030" y2="500" stroke="#4F46E5" stroke-width="4"  marker-end="url(#arrow)"/><line x1="900" y1="560" x2="1030" y2="760" stroke="#B45309" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1380" y1="470" x2="1530" y2="360" stroke="#15803D" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1380" y1="530" x2="1530" y2="660" stroke="#B91C1C" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1030" y1="270" x2="900" y2="410" stroke="#2563EB" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1030" y1="760" x2="900" y2="570" stroke="#B45309" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1530" y1="360" x2="900" y2="460" stroke="#15803D" stroke-width="4"  marker-end="url(#arrow)"/><line x1="1530" y1="660" x2="900" y2="540" stroke="#B91C1C" stroke-width="4"  marker-end="url(#arrow)"/><rect x="100" y="875" width="1720" height="100" rx="18" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/><text x="960" y="917" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#B91C1C"><tspan x="960" dy="0">Deliberately absent because the backend does not support them:</tspan></text><text x="960" y="952" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="600" fill="#58657A"><tspan x="960" dy="0">users • assignees • due dates • tags • comments • subtasks • reopening completed tasks</tspan></text></svg>